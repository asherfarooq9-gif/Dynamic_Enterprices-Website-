<!DOCTYPE html>
<html><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>body{margin:0;background:#060a12;}</style>
</head><body>

<div style="position:relative; width:100%; height:100vh; overflow:hidden; background:radial-gradient(ellipse at 30% 40%, #243349 0%, #1a2332 40%, #0a0f18 100%); font-family:'Roboto',sans-serif;">
  <div style="position:absolute; inset:0; background:radial-gradient(circle at 65% 55%, rgba(212,183,74,0.12), transparent 45%); pointer-events:none;"></div>
  <div style="position:absolute; top:-20%; left:-10%; width:80%; height:140%; background:linear-gradient(115deg, transparent 45%, rgba(212,183,74,0.04) 50%, transparent 55%); pointer-events:none; transform:rotate(-8deg);"></div>

  <canvas id="ambient" style="position:absolute; inset:0; width:100%; height:100%; display:block;"></canvas>
  <canvas id="sandC" style="position:absolute; inset:0; width:100%; height:100%; display:block;"></canvas>

  <div style="position:absolute; inset:0; box-shadow:inset 0 0 120px rgba(0,0,0,0.6); pointer-events:none;"></div>

  <div style="position:absolute; top:24px; left:28px; right:28px; display:flex; justify-content:space-between; align-items:center; z-index:3; pointer-events:none;">
    <div style="color:#d4b74a; font-size:13px; font-weight:500; letter-spacing:4px;">DE</div>
    <div style="display:flex; gap:28px; color:#f5f0e6; font-size:10px; font-weight:300; letter-spacing:3px; opacity:0.75;">
      <span>INTERIOR</span><span>SUPPLIES</span><span>FILMS</span><span>EVENTS</span>
    </div>
  </div>

  <div style="position:absolute; bottom:28px; left:28px; right:28px; display:flex; justify-content:space-between; align-items:flex-end; z-index:3;">
    <div style="color:#f5f0e6; opacity:0.4; font-size:9px; letter-spacing:3px; pointer-events:none; font-weight:300;">EST · ISLAMABAD ✦ MMXXV</div>
    <div style="display:flex; flex-direction:column; align-items:center; gap:6px; pointer-events:none;">
      <div style="color:#d4b74a; font-size:9px; letter-spacing:3px;">SCROLL</div>
      <div style="width:1px; height:24px; background:linear-gradient(to bottom, #d4b74a, transparent);"></div>
    </div>
  </div>
</div>

<script>
(function(){
  const ambC = document.getElementById('ambient');
  const actx = ambC.getContext('2d');
  const canvas = document.getElementById('sandC');
  const ctx = canvas.getContext('2d');
  let W, H, particles = [], ambient = [];
  let mouseX = -9999, mouseY = -9999;
  let phase = 'forming', phaseTime = 0, t = 0;

  function build() {
    const rect = canvas.getBoundingClientRect();
    const dpr = window.devicePixelRatio || 1;
    [canvas, ambC].forEach(c => { c.width = rect.width*dpr; c.height = rect.height*dpr; });
    ctx.setTransform(dpr,0,0,dpr,0,0);
    actx.setTransform(dpr,0,0,dpr,0,0);
    W = rect.width; H = rect.height;

    const off = document.createElement('canvas');
    off.width = W; off.height = H;
    const octx = off.getContext('2d');
    octx.fillStyle = '#fff';
    octx.textAlign = 'center';
    octx.textBaseline = 'middle';
    const size = Math.min(W / 9.5, 110);
    octx.font = '700 ' + size + "px 'Roboto', sans-serif";
    octx.fillText('DYNAMIC', W/2, H/2 - size*0.55);
    octx.font = '300 ' + (size*0.4) + "px 'Roboto', sans-serif";
    octx.fillText('E N T E R P R I S E S', W/2, H/2 + size*0.3);

    const img = octx.getImageData(0,0,W,H).data;
    particles = [];
    const step = 3;
    for (let y = 0; y < H; y += step) {
      for (let x = 0; x < W; x += step) {
        if (img[(y*W + x)*4 + 3] > 128) {
          const angle = Math.random() * Math.PI * 2;
          const dist = Math.random() * Math.max(W, H) * 0.9 + 100;
          particles.push({
            tx: x + (Math.random()-0.5)*1.5,
            ty: y + (Math.random()-0.5)*1.5,
            x: W/2 + Math.cos(angle) * dist,
            y: H/2 + Math.sin(angle) * dist,
            vx: (Math.random()-0.5) * 0.5,
            vy: (Math.random()-0.5) * 0.5,
            size: Math.random() * 1.3 + 0.4,
            hue: Math.random() > 0.75 ? '#d4b74a' : (Math.random() > 0.4 ? '#f5f0e6' : '#c9b98a'),
            alpha: 0,
            targetAlpha: Math.random() * 0.5 + 0.5,
            delay: Math.random() * 90,
            wanderPhase: Math.random() * Math.PI * 2,
            wanderSpeed: 0.02 + Math.random() * 0.02,
            wobbleX: Math.random() * 2 - 1,
            wobbleY: Math.random() * 2 - 1
          });
        }
      }
    }

    ambient = [];
    for (let i = 0; i < 80; i++) {
      ambient.push({
        x: Math.random() * W, y: Math.random() * H,
        vx: (Math.random() - 0.5) * 0.2, vy: -0.05 - Math.random() * 0.15,
        size: Math.random() * 1.4 + 0.3,
        alpha: Math.random() * 0.25 + 0.05,
        hue: Math.random() > 0.6 ? '#d4b74a' : '#f5f0e6'
      });
    }
  }

  function setPhase(p) { phase = p; phaseTime = 0; }

  function drawAmbient() {
    actx.clearRect(0, 0, W, H);
    for (let a of ambient) {
      a.x += a.vx + Math.sin(t * 0.01 + a.y * 0.01) * 0.15;
      a.y += a.vy;
      if (a.y < -10) { a.y = H + 10; a.x = Math.random() * W; }
      if (a.x < -10) a.x = W + 10;
      if (a.x > W + 10) a.x = -10;
      actx.fillStyle = a.hue;
      actx.globalAlpha = a.alpha;
      actx.beginPath();
      actx.arc(a.x, a.y, a.size, 0, Math.PI * 2);
      actx.fill();
    }
    actx.globalAlpha = 1;
  }

  function draw() {
    t++; phaseTime++;
    ctx.fillStyle = 'rgba(10, 15, 24, 0.14)';
    ctx.fillRect(0, 0, W, H);
    drawAmbient();

    if (phase === 'forming' && phaseTime > 260) setPhase('resting');
    if (phase === 'resting' && phaseTime > 420) setPhase('disintegrating');
    if (phase === 'disintegrating' && phaseTime > 200) {
      for (let p of particles) {
        const a = Math.random() * Math.PI * 2;
        const d = Math.random() * Math.max(W, H) * 0.9 + 100;
        p.x = W/2 + Math.cos(a) * d;
        p.y = H/2 + Math.sin(a) * d;
        p.vx = (Math.random()-0.5) * 0.5;
        p.vy = (Math.random()-0.5) * 0.5;
        p.alpha = 0;
        p.delay = Math.random() * 90;
      }
      setPhase('forming');
    }

    for (let p of particles) {
      if (phase === 'forming') {
        if (phaseTime > p.delay) {
          p.vx += (p.tx - p.x) * 0.025;
          p.vy += (p.ty - p.y) * 0.025;
          p.vx *= 0.82; p.vy *= 0.82;
          p.alpha = Math.min(p.targetAlpha, p.alpha + 0.02);
        }
      } else if (phase === 'resting') {
        p.wanderPhase += p.wanderSpeed;
        const wx = Math.sin(p.wanderPhase) * p.wobbleX * 0.4;
        const wy = Math.cos(p.wanderPhase * 0.7) * p.wobbleY * 0.4;
        p.vx += (p.tx + wx - p.x) * 0.05;
        p.vy += (p.ty + wy - p.y) * 0.05;
        p.vx *= 0.75; p.vy *= 0.75;
      } else if (phase === 'disintegrating') {
        const windX = Math.sin(t * 0.02 + p.y * 0.01) * 0.4 + 0.6;
        const windY = Math.cos(t * 0.015 + p.x * 0.008) * 0.3 - 0.15;
        p.vx += windX * (0.15 + Math.random() * 0.2);
        p.vy += windY * (0.15 + Math.random() * 0.2);
        p.vx *= 0.97; p.vy *= 0.97;
        p.alpha *= 0.988;
      }

      const mdx = p.x - mouseX, mdy = p.y - mouseY;
      const md = mdx*mdx + mdy*mdy;
      if (md < 4900) {
        const f = (4900 - md) / 4900;
        const dist = Math.sqrt(md + 1);
        p.vx += (mdx / dist) * f * 1.8;
        p.vy += (mdy / dist) * f * 1.8;
      }

      p.x += p.vx; p.y += p.vy;
      ctx.fillStyle = p.hue;
      ctx.globalAlpha = p.alpha;
      ctx.fillRect(p.x, p.y, p.size, p.size);
    }
    ctx.globalAlpha = 1;
    requestAnimationFrame(draw);
  }

  canvas.addEventListener('mousemove', e => {
    const r = canvas.getBoundingClientRect();
    mouseX = e.clientX - r.left; mouseY = e.clientY - r.top;
  });
  canvas.addEventListener('mouseleave', () => { mouseX = -9999; mouseY = -9999; });

  if (document.fonts && document.fonts.ready) { document.fonts.ready.then(build); }
  else { setTimeout(build, 300); }
  window.addEventListener('resize', build);
  draw();
})();
</script>
</body></html>
