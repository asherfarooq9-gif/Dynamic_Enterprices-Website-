<!DOCTYPE html>
<html><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@700&display=swap" rel="stylesheet">
<style>
body{margin:0;background:#ffffff;}
.cta { font-family:'Roboto',sans-serif; font-weight:700; background:#ffffff; overflow:hidden; position:relative; padding:100px 40px; text-align:center; min-height:60vh; display:flex; flex-direction:column; align-items:center; justify-content:center; box-sizing:border-box; }
.cta::before { content:''; position:absolute; inset:0;
  background:
    radial-gradient(ellipse at 20% 30%, rgba(255,255,255,1) 0%, transparent 45%),
    radial-gradient(ellipse at 80% 70%, rgba(248,249,251,0.95) 0%, transparent 50%),
    radial-gradient(ellipse at 60% 20%, rgba(238,242,247,0.9) 0%, transparent 50%),
    linear-gradient(135deg, #ffffff 0%, #f4f6f9 50%, #eceff4 100%);
  pointer-events:none; }
.cta-veins { position:absolute; inset:0; opacity:0.4; pointer-events:none; }
.cta-mark { position:relative; z-index:2; color:#1a2332; margin-bottom:44px; font-size:18px; letter-spacing:3px; display:flex; align-items:center; gap:8px; }
.cta-mark span { color:#d4b74a; }
.cta-title { position:relative; z-index:2; font-size:62px; line-height:1.05; letter-spacing:-1.5px; margin:0 0 20px; max-width:940px;
  background:linear-gradient(135deg, #2d3d55 0%, #1a2332 45%, #3d5273 75%, #1a2332 100%);
  -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; color:transparent; }
.cta-sub { position:relative; z-index:2; font-size:13px; letter-spacing:1px; color:rgba(26,35,50,0.55); font-weight:700; margin:0 0 44px; }
.cta-btn { position:relative; z-index:2; background:#1a2332; color:#ffffff; padding:17px 34px; font-family:'Roboto',sans-serif; font-weight:700; font-size:12px; letter-spacing:3px; border:none; border-radius:4px; cursor:pointer; transition:all 0.35s; box-shadow:0 10px 28px rgba(26,35,50,0.3); }
.cta-btn:hover { background:#d4b74a; color:#1a2332; transform:translateY(-2px); box-shadow:0 16px 36px rgba(26,35,50,0.35); }
.cta-foot { position:absolute; bottom:20px; left:0; right:0; display:flex; justify-content:space-between; align-items:center; padding:0 32px; z-index:2; color:rgba(26,35,50,0.4); font-size:9px; letter-spacing:3px; }
.cta-foot b { color:#1a2332; }
</style>
</head><body>
<div class="cta">
  <svg class="cta-veins" viewBox="0 0 1400 500" preserveAspectRatio="xMidYMid slice">
    <defs>
      <linearGradient id="nv1" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#1a2332" stop-opacity="0"/><stop offset="0.5" stop-color="#1a2332" stop-opacity="0.22"/><stop offset="1" stop-color="#1a2332" stop-opacity="0"/></linearGradient>
      <linearGradient id="nv2" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#2d3d55" stop-opacity="0"/><stop offset="0.5" stop-color="#2d3d55" stop-opacity="0.16"/><stop offset="1" stop-color="#2d3d55" stop-opacity="0"/></linearGradient>
    </defs>
    <path d="M-50,80 Q220,20 460,110 T900,90 T1500,120" stroke="url(#nv1)" stroke-width="1.2" fill="none" opacity="0.6"/>
    <path d="M-50,200 Q280,140 540,240 T980,220 T1500,260" stroke="url(#nv2)" stroke-width="1" fill="none" opacity="0.55"/>
    <path d="M-50,340 Q260,280 520,380 T960,350 T1500,390" stroke="url(#nv1)" stroke-width="1.4" fill="none" opacity="0.5"/>
    <path d="M-50,440 Q240,380 500,470 T940,450 T1500,480" stroke="url(#nv2)" stroke-width="0.9" fill="none" opacity="0.45"/>
    <path d="M240,-40 Q300,150 240,320 T280,540" stroke="url(#nv1)" stroke-width="0.8" fill="none" opacity="0.35"/>
    <path d="M760,-40 Q820,180 760,360 T800,540" stroke="url(#nv2)" stroke-width="0.7" fill="none" opacity="0.3"/>
    <path d="M1180,-40 Q1120,180 1160,360 T1140,540" stroke="url(#nv1)" stroke-width="0.8" fill="none" opacity="0.35"/>
  </svg>

  <div class="cta-mark"><span>&#9670;</span>DYNAMIC ENTERPRISES</div>
  <h2 class="cta-title">SPACES DESIGNED.<br>STORIES DELIVERED.</h2>
  <p class="cta-sub">INTERIOR · SUPPLIES · FILMS · EVENTS — ONE STUDIO, FULL ACCOUNTABILITY</p>
  <button class="cta-btn">START A PROJECT</button>
  <div class="cta-foot"><span>ISLAMABAD · PAKISTAN</span><span>EST · <b>MMXI</b></span></div>
</div>
</body></html>
